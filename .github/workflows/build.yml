name: Android Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Allows manual builds from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        lfs: true

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleRelease

    - name: Sign Android Release
      if: github.event_name != 'pull_request'
      uses: r0adkll/sign-android-release@v1
      id: sign_app
      with:
        releaseDirectory: app/build/outputs/apk/release
        signingKeyBase64: ${{ secrets.SIGNING_KEY }}
        alias: ${{ secrets.ALIAS }}
        keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
        keyPassword: ${{ secrets.KEY_PASSWORD }}
      env:
        BUILD_TOOLS_VERSION: "35.0.0"

    - name: Upload Signed APKs
      uses: actions/upload-artifact@v4
      with:
        name: Vidora-Signed-APKs
        path: app/build/outputs/apk/release/*-signed.apk

    - name: Upload Unsigned APKs (For Debugging)
      uses: actions/upload-artifact@v4
      with:
        name: Vidora-Unsigned-APKs
        path: app/build/outputs/apk/release/*-unsigned.apk
